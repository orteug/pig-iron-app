name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g vercel
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_4nMSXUNW3PprmUKs03uNNP2X
          VERCEL_PROJECT_ID: prj_hatOeF6fvAmA4MzVg7xGG6oWSpDZ
      - run: bash build.sh
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_4nMSXUNW3PprmUKs03uNNP2X
          VERCEL_PROJECT_ID: prj_hatOeF6fvAmA4MzVg7xGG6oWSpDZ

  deploy-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g vercel
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_4nMSXUNW3PprmUKs03uNNP2X
          VERCEL_PROJECT_ID: prj_FO2GQ0TbtEpjGLcLZ9gEpBTZwzPS
      - run: DEMO=true bash build.sh
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_4nMSXUNW3PprmUKs03uNNP2X
          VERCEL_PROJECT_ID: prj_FO2GQ0TbtEpjGLcLZ9gEpBTZwzPS
